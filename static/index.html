<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>社团会议纪要生成器</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">纪</div>
          <h1>会议纪要生成器</h1>
        </div>

        <section class="panel">
          <h2>上传音频</h2>
          <label class="upload-box" for="audioInput">
            <span class="upload-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M12 16V4m0 0 4.5 4.5M12 4 7.5 8.5M5 16.5V19a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5" />
              </svg>
            </span>
            <span id="fileName">选择音频文件</span>
          </label>
          <input id="audioInput" class="sr-only" type="file" accept=".mp3,.m4a,.wav,audio/*" />

          <label class="field">
            <span>会议类型</span>
            <select id="meetingType">
              <option value="management_weekly">管理层周例会</option>
              <option value="recruitment_prep">招聘会筹备</option>
            </select>
          </label>

          <label class="field">
            <span>会议日期</span>
            <input id="meetingDate" type="text" placeholder="2026-03-25" />
          </label>

          <label class="toggle-row">
            <span>在线总结</span>
            <input id="useOnlineSummary" type="checkbox" checked />
          </label>

          <button id="generateBtn" class="primary-btn">
            <span aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M8 5v14l11-7Z" />
              </svg>
            </span>
            生成纪要
          </button>
        </section>
      </aside>

      <main class="workspace">
        <section class="status-strip" aria-live="polite">
          <div class="steps">
            <div id="transcribeStep" class="step pending">
              <span class="step-dot"></span>
              <span>转录</span>
            </div>
            <span class="step-line" aria-hidden="true"></span>
            <div id="summarizeStep" class="step pending">
              <span class="step-dot"></span>
              <span>总结</span>
            </div>
          </div>
          <div id="statusText" class="status-text">等待音频</div>
        </section>

        <section class="result-panel">
          <div class="result-header">
            <h2>Markdown</h2>
            <div class="actions">
              <button id="copyBtn" class="ghost-btn" type="button">
                <span aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M8 8h10v12H8z" />
                    <path d="M6 16H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1" />
                  </svg>
                </span>
                复制
              </button>
              <button id="downloadBtn" class="ghost-btn" type="button">
                <span aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M12 4v10m0 0 4-4m-4 4-4-4M5 20h14" />
                  </svg>
                </span>
                下载
              </button>
            </div>
          </div>
          <textarea id="output" readonly placeholder="生成结果会出现在这里..."></textarea>
        </section>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
