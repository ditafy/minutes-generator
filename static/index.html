<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>社团会议纪要生成器</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>社团会议纪要生成器</h1>

      <div class="card">
        <h2>上传音频</h2>
        <input id="audioInput" type="file" accept=".mp3,.m4a,.wav,audio/*" />

        <div class="grid">
          <label>
            会议类型
            <select id="meetingType">
              <option value="management_weekly">管理层周例会</option>
              <option value="recruitment_prep">招聘会筹备会议</option>
            </select>
          </label>
          <label>
            会议日期（可选）
            <input id="meetingDate" type="text" placeholder="例如：2026-03-25" />
          </label>
          <label>
            在线结构化总结
            <span class="checkbox-row">
              <input id="useOnlineSummary" type="checkbox" checked />
              <span>优先使用在线总结，失败时自动回退离线模式</span>
            </span>
          </label>
        </div>

        <div id="meetingHint" class="hint">
          管理层周例会将重点输出部门进展、协同问题、本周决定和 Todo。
        </div>

        <button id="generateBtn">生成纪要</button>
      </div>

      <div class="card">
        <h2>进度</h2>
        <div class="row">
          <div>阶段：<span id="stage">queued</span></div>
          <div>进度：<span id="progress">0</span>%</div>
        </div>
        <div class="progress">
          <div id="progressBar" class="bar"></div>
        </div>
        <div id="statusText" class="muted"></div>
      </div>

      <div class="card">
        <h2>生成结果（Markdown）</h2>
        <textarea id="output" readonly placeholder="生成结果会出现在这里..."></textarea>
        <div class="row">
          <button id="copyBtn" class="secondary">复制 Markdown</button>
          <button id="downloadBtn" class="secondary">保存为 .md</button>
        </div>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
